---
name: CI

on:
  push:
    branches: [ main, master, develop ]
  pull_request:
    branches: [ main, master, develop ]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible ansible-lint yamllint

      - name: Run yamllint
        run: |
          yamllint -c .yamllint .
        continue-on-error: true

      - name: Run ansible-lint
        run: |
          ansible-lint
        continue-on-error: true

      - name: Ansible syntax check
        run: |
          printf '[defaults]\nroles_path=../' > ansible.cfg
          ansible-playbook tests/test.yml -i tests/inventory --syntax-check

  test-syntax:
    name: Test Syntax (Ansible ${{ matrix.ansible-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        ansible-version:
          - '2.9'
          - '2.10'
          - '2.11'
          - '2.12'
          - '2.13'
          - '2.14'
          - '2.15'
          - 'stable-2.16'
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Ansible ${{ matrix.ansible-version }}
        run: |
          python -m pip install --upgrade pip
          if [ "${{ matrix.ansible-version }}" = "stable-2.16" ]; then
            pip install ansible
          else
            pip install ansible==${{ matrix.ansible-version }}.*
          fi

      - name: Display Ansible version
        run: ansible --version

      - name: Syntax check
        run: |
          printf '[defaults]\nroles_path=../' > ansible.cfg
          ansible-playbook tests/test.yml -i tests/inventory --syntax-check

  test-integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [lint, test-syntax]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ansible docker

      - name: Display Ansible version
        run: ansible --version

      - name: Install Docker
        run: |
          sudo apt-get update
          sudo apt-get install -y docker.io docker-compose
          sudo systemctl start docker
          sudo systemctl enable docker
          sudo usermod -aG docker $USER

      - name: Verify Docker installation
        run: |
          docker --version
          docker-compose --version

      - name: Setup test environment
        run: |
          printf '[defaults]\nroles_path=../' > ansible.cfg

      - name: Run basic syntax test
        run: |
          ansible-playbook tests/test.yml -i tests/inventory --syntax-check

      - name: Run compose deployment test
        run: |
          ansible-playbook tests/test-compose.yml -i tests/inventory -vv
        continue-on-error: true

      - name: Run files and templates test
        run: |
          ansible-playbook tests/test-files-templates.yml -i tests/inventory -vv

      - name: Run secrets and configs test
        run: |
          ansible-playbook tests/test-secrets-configs.yml -i tests/inventory -vv
        continue-on-error: true

      - name: Cleanup Docker
        if: always()
        run: |
          docker ps -a
          docker stop $(docker ps -aq) || true
          docker rm $(docker ps -aq) || true
          docker swarm leave --force || true

  test-molecule:
    name: Molecule Tests
    runs-on: ubuntu-latest
    needs: [lint]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install molecule molecule-plugins[docker] ansible docker

      - name: Run Molecule tests
        run: |
          molecule test
        continue-on-error: true
        working-directory: ${{ github.workspace }}

  notify:
    name: Notify Ansible Galaxy
    runs-on: ubuntu-latest
    needs: [test-integration]
    if: github.ref == 'refs/heads/master' && github.event_name == 'push'
    steps:
      - name: Trigger galaxy import
        run: |
          echo "Would notify Ansible Galaxy here"
          # curl -X POST https://galaxy.ansible.com/api/v1/notifications/
