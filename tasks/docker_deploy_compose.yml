---
- name: Template docker-compose
  template:
    dest: "{{ docker_deploy_base_folder }}/docker-compose.yml"
    src: "{{ docker_deploy_compose_template }}"
    backup: "{{ docker_deploy_compose_template_backup }}"
  register: docker_compose_template_out
  tags: docker_deploy

- name: Stop docker containers and remove its volumes
  # Do not change this deprecated name to 'docker_compose' so we can still be compatible with ansible 2.7
  community.docker.docker_compose_v2:
    project_src: "{{ docker_deploy_base_folder }}"
    state: absent
    remove_volumes: true
  when: docker_deploy_force_remove_volumes | default(false)
  tags: docker_deploy

- name: Start docker containers using docker_compose_v2 community module
  # Do not change this deprecated name to 'docker_compose' so we can still be compatible with ansible 2.7
  community.docker.docker_compose_v2:
    project_src: "{{ docker_deploy_base_folder }}"
    services: "{{ limited_services.split(',') if limited_services is defined else omit }}"
    # restart all containers if anything has changed
    state: "{{ 'restarted' if ((docker_deploy_force_restart | default(false)) or docker_compose_template_out.changed or docker_deploy_files_out.changed or docker_deploy_templates_out.changed or docker_deploy_git_repositories_out.changed) else omit }}"
    pull: "{{ docker_deploy_pull | default(omit) }}"
    build: "{{ docker_deploy_build | default(omit) }}"
    wait: true # wait for containers to be running/healthy
    recreate: "{{ docker_deploy_recreate | default(omit) }}"
  register: docker_deploy_output
  tags: docker_deploy

- name: HealthCheck
  include_tasks: docker_healthcheck.yml
  tags:
    - docker_deploy
    - healthcheck
