---
- name: Converge
  hosts: all
  gather_facts: yes
  become: yes

  vars:
    test_deploy_folder: "/opt/test-app"

  pre_tasks:
    - name: Update apt cache
      apt:
        update_cache: yes
        cache_valid_time: 3600
      when: ansible_os_family == 'Debian'

    - name: Install Docker CLI and required packages
      apt:
        name:
          - docker.io
          - docker-compose-v2
          - python3-docker
        state: present
      when: ansible_os_family == 'Debian'

  roles:
    - role: ansible-docker-deploy
      docker_deploy_base_folder: "{{ test_deploy_folder }}"
      docker_deploy_compose_template: "{{ playbook_dir }}/files/docker-compose.yml.j2"
      docker_deploy_shell: true
