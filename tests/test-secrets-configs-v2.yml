---
- hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    test_base_folder: "/tmp/ansible-docker-deploy-test-secrets-v2"
    test_deploy_folder: "{{ test_base_folder }}/test-app"
    test_secret_value: "my-secret-password-v2-123"
    test_config_value: "app.config=production-v2"

  tasks:
    - name: Clean up test directory
      file:
        path: "{{ test_base_folder }}"
        state: absent

    - name: Create test directory
      file:
        path: "{{ test_base_folder }}"
        state: directory
        mode: '0755'

    - name: Create simple docker-compose template
      copy:
        dest: "{{ test_base_folder }}/docker-compose.yml.j2"
        content: |
          version: '3.8'
          services:
            alpine:
              image: alpine:latest
              container_name: test_alpine_secrets_v2
              command: sleep 30

    - name: Test deployment with secrets and configs using docker_compose_v2
      include_role:
        name: ansible-docker-deploy
      vars:
        docker_deploy_base_folder: "{{ test_deploy_folder }}"
        docker_deploy_compose_template: "{{ test_base_folder }}/docker-compose.yml.j2"
        # docker_deploy_shell is NOT set, so it will use docker_compose_v2 module
        docker_deploy_templates:
          - src_data: "{{ test_secret_value }}"
            dest: "{{ test_deploy_folder }}/secret-data"
            secret_name: test_secret
            docker_target: /run/secrets/app-secret
            owner: "{{ ansible_user_id }}"
            group: "{{ ansible_user_id }}"
          - src_data: "{{ test_config_value }}"
            dest: "{{ test_deploy_folder }}/config-data"
            config_name: test_config
            docker_target: /config/app.conf
            owner: "{{ ansible_user_id }}"
            group: "{{ ansible_user_id }}"

    - name: Verify secret file was created
      stat:
        path: "{{ test_deploy_folder }}/secret-data"
      register: secret_file
      failed_when: not secret_file.stat.exists

    - name: Verify config file was created
      stat:
        path: "{{ test_deploy_folder }}/config-data"
      register: config_file
      failed_when: not config_file.stat.exists

    - name: Verify secret file content
      command: cat "{{ test_deploy_folder }}/secret-data"
      register: secret_content
      changed_when: false

    - name: Verify config file content
      command: cat "{{ test_deploy_folder }}/config-data"
      register: config_content
      changed_when: false

    - name: Assert secret content is correct
      assert:
        that:
          - secret_content.stdout == test_secret_value
        fail_msg: "Secret content does not match expected value"

    - name: Assert config content is correct
      assert:
        that:
          - config_content.stdout == test_config_value
        fail_msg: "Config content does not match expected value"

    - name: Verify checksum facts were created
      assert:
        that:
          - docker_deploy_secrets_checksum is defined
          - docker_deploy_configs_checksum is defined
          - "'test-app_test_secret' in docker_deploy_secrets_checksum"
          - "'test-app_test_config' in docker_deploy_configs_checksum"
        fail_msg: "Checksum facts were not properly created"

    - name: Display checksum facts for verification
      debug:
        msg:
          - "Secret checksums: {{ docker_deploy_secrets_checksum }}"
          - "Config checksums: {{ docker_deploy_configs_checksum }}"

    - name: Verify secret checksum is a valid SHA hash
      assert:
        that:
          - docker_deploy_secrets_checksum['test-app_test_secret'] | length == 10
          - docker_deploy_configs_checksum['test-app_test_config'] | length == 10
        fail_msg: "Checksums are not the expected length"

    - name: Stop and remove test container
      docker_container:
        name: test_alpine_secrets_v2
        state: absent
      ignore_errors: yes

    - name: Clean up test directory
      file:
        path: "{{ test_base_folder }}"
        state: absent
